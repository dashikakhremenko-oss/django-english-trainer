<html>
<head>

            position: fixed;
            top: 0;
            left: 0;
            font-size: 40px;
            opacity: 0.5;
            pointer-events: none;
            white-space: normal;
            word-wrap: break-word;
            width: 100%;
            height: 100%;
            line-height: 1.5;
            z-index: 0;
        }

        .menu {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        .menu a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }
        .menu a:hover {
            text-decoration: underline;
        }
        .content {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            max-width: 800px;
            margin: auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            transform: scale(1.05);
        }
        .error {
            color: red;
        }
        input, textarea {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
            width: 100%;
            margin: 5px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="menu">
        <a href="/">Главная</a>
        <a href="/list/">Список слов</a>
        <a href="/add/">Добавить</a>
        <a href="/quiz/">Тест</a>
    </div>
    <div class="content">
        {% if messages %}
            {% for message in messages %}
                <p style="color:green;">{{ message }}</p>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
